<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Công Việc & Water Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="user-profile">
            <div class="user-selector-wrapper">
                <span class="avatar">👤</span>
                <select id="userSelect" onchange="handleUserChange()"></select>
            </div>
            <button class="delete-name-btn" onclick="deleteCurrentUser()">Xóa User</button>
        </div>

        <div class="header">
            <h1 class="month-title">March</h1>
        </div>

        <div class="calendar" id="calendarGrid">
            <div class="weekday">S</div><div class="weekday">M</div><div class="weekday">T</div>
            <div class="weekday">W</div><div class="weekday">T</div><div class="weekday">F</div><div class="weekday">S</div>
        </div>

        <div id="progressBarsContainer" class="progress-bars-container"></div>

        <div class="task-list" id="taskList"></div>

        <div class="add-task-container">
            <div style="display: flex; gap: 10px; width: 100%;">
                <input type="text" id="newTaskInput" placeholder="Thêm công việc mới..." onkeypress="handleKeyPress(event)">
                <button onclick="addTask()">Thêm</button>
            </div>
            <div class="suggested-tasks" id="suggestedTasksContainer"></div>
        </div>
    </div>

    <button class="water-fab" onclick="toggleWaterModal()">💧</button>

    <div id="waterModalOverlay" class="water-overlay">
        <div class="water-container">
            <button class="close-water-btn" onclick="toggleWaterModal()">✕</button>

            <div id="screen-goal" class="water-screen active">
                <h2>Thiết lập Mục tiêu</h2>
                <div class="water-input-group">
                    <label>Cân nặng hiện tại (kg):</label>
                    <input type="number" id="weightInput" placeholder="VD: 60" min="1" step="0.1">
                    <div id="weightError" class="water-error">Vui lòng nhập cân nặng hợp lệ!</div>
                </div>
                <button class="water-btn" onclick="calculateGoal()">Tính toán</button>

                <div id="goalSelectionArea" style="display: none;">
                    <div id="waterRecommendationText" class="recommendation-box"></div>
                    <div class="water-input-group">
                        <label>Chọn mục tiêu (Lít):</label>
                        <select id="goalSelect"></select>
                    </div>
                    <button class="water-btn" onclick="goToScreenBottle()">Tiếp tục</button>
                </div>
            </div>

            <div id="screen-bottle" class="water-screen">
                <h2>Thiết lập Bình nước</h2>
                <div class="water-input-group">
                    <label>Thể tích bình (ml):</label>
                    <input type="number" id="bottleInput" placeholder="VD: 500" min="1">
                    <div id="bottleError" class="water-error">Vui lòng nhập thể tích hợp lệ!</div>
                </div>
                <button class="water-btn" onclick="goToScreenTracker()">Xác nhận</button>
            </div>

            <div id="screen-tracker" class="water-screen">
                <h2>Tiến độ của <span id="userNameDisplay" style="color:#e74c3c;">Bạn</span></h2>
                <div class="progress-text"><span id="consumedText">0.00</span>L / <span id="goalText">0.0</span>L</div>
                <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
                <button class="water-btn" onclick="addBottle()">+1 Bình (<span id="btnBottleVol">0</span>ml)</button>
                <div class="history-container" id="historyContainer" style="display: none;">
                    <h3>Lịch sử hôm nay</h3>
                    <ul id="historyList"></ul>
                </div>
                <button class="reset-water-btn" onclick="resetWaterApp()">⚙️ Cài đặt lại từ đầu</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
